<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OST MATCH POINT 통합 점수 게시판</title>
  <meta name="description" content="여러 앱의 투표를 실시간으로 합산해 보여주는 OST MATCH POINT 통합 점수 게시판 — 대중가수 / 아이돌 부문" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="container hero-inner">
      <img class="hero-logo" src="./assets/logo.svg" alt="OST MATCH POINT" />
      <p class="hero-tagline">Fans Vote · Artists Record — 통합 점수 게시판</p>
    </div>
  </header>

  <main class="container main-content">
    <!-- 부문 탭 (대중가수 / 아이돌) — JS가 데이터의 부문으로 채움 -->
    <nav class="cat-tabs" id="cat-tabs" aria-label="부문 선택"></nav>

    <section class="toolbar" aria-label="검색 및 새로고침">
      <div class="toolbar-left">
        <label class="field">
          <span class="field-label">검색</span>
          <input type="search" id="filter-search" placeholder="후보명 검색" />
        </label>
      </div>
      <div class="toolbar-right">
        <span class="live-badge" title="실시간 집계"><span class="live-badge-dot"></span>실시간</span>
        <span class="updated-at" id="updated-at"></span>
        <button class="btn btn-primary" id="refresh-btn" type="button">새로고침</button>
      </div>
    </section>

    <!-- TOP 3 포디움 (크게 강조) -->
    <section class="podium" id="podium" aria-label="TOP 3"></section>

    <!-- 랭킹 헤더 -->
    <div class="ranking-head">
      <h2 class="ranking-title">RANKING</h2>
      <span class="ranking-sub" id="ranking-sub"></span>
    </div>

    <!-- 랭킹 리스트 -->
    <section class="ranking-list" id="ranking-list" aria-label="투표 합산 랭킹"></section>

    <!-- 빈/에러 상태 -->
    <div class="empty-state" id="empty-state" hidden>
      <p id="empty-text">표시할 후보가 없습니다.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> OST MATCH POINT · 통합 점수 게시판</p>
    </div>
  </footer>

  <!-- 후보 명단(로스터): 기본값 + 공용 헬퍼 -->
  <script src="./data/roster.js"></script>
  <script src="./js/roster.js"></script>
  <!-- 데이터 소스 모듈 (로스터 + 서버리스 프록시 /api/scores 득표) -->
  <script src="./js/dataSource.js"></script>
  <!-- UI 렌더링 / 앱 진입점 -->
  <script src="./js/app.js"></script>
</body>
</html>
